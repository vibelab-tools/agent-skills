# ABOUTME: Cloudflare Worker configuration for VibeLab Relay.
# ABOUTME: Defines KV namespace bindings and custom domain routing.

name = "vibelab-relay"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[kv_namespaces]]
binding = "RELAY_KV"
id = "<replace-with-your-kv-namespace-id>"

# Add a route after you attach a custom domain, for example:
#
# [[routes]]
# pattern = "relay.example.com"
# custom_domain = true
